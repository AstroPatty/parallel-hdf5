name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  # ── Stage 1: MPICH ──────────────────────────────────────────────────────────

  build-mpich:
    name: Build mpich (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanitize platform name
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        run: |
          docker buildx bake mpich \
            --set "*.platform=${{ matrix.platform }}" \
            --set "*.tags=" \
            --set "*.output=type=image,name=docker.io/astropatty/mpich,push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file /tmp/bake-metadata.json

      - name: Upload digest metadata
        uses: actions/upload-artifact@v4
        with:
          name: bake-metadata-mpich-${{ env.PLATFORM_PAIR }}
          path: /tmp/bake-metadata.json
          if-no-files-found: error

  merge-mpich:
    name: Create mpich multi-arch manifests
    runs-on: ubuntu-latest
    needs: build-mpich

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bake-metadata-mpich-*
          path: /tmp/bake-metadata

      - name: Create manifests
        run: |
          IMAGE=docker.io/astropatty/mpich
          BAKE_PRINT=$(docker buildx bake mpich --print 2>/dev/null)

          while IFS= read -r target; do
            AMD64=$(jq -r '."'"$target"'"."containerimage.digest"' \
              /tmp/bake-metadata/bake-metadata-mpich-linux-amd64/bake-metadata.json)
            ARM64=$(jq -r '."'"$target"'"."containerimage.digest"' \
              /tmp/bake-metadata/bake-metadata-mpich-linux-arm64/bake-metadata.json)

            readarray -t TAGS < <(echo "$BAKE_PRINT" | jq -r '.target["'"$target"'"].tags[]')
            TAG_ARGS=()
            for tag in "${TAGS[@]}"; do
              TAG_ARGS+=(--tag "$tag")
            done

            docker buildx imagetools create "${TAG_ARGS[@]}" \
              ${IMAGE}@${AMD64} \
              ${IMAGE}@${ARM64}
          done < <(echo "$BAKE_PRINT" | jq -r '.target | keys[]')

  # ── Stage 2: Python + mpi4py ─────────────────────────────────────────────────

  build-python:
    name: Build python (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: merge-mpich
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanitize platform name
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        run: |
          docker buildx bake python \
            --set "*.platform=${{ matrix.platform }}" \
            --set "*.tags=" \
            --set "*.output=type=image,name=docker.io/astropatty/mpi4py,push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file /tmp/bake-metadata.json

      - name: Upload digest metadata
        uses: actions/upload-artifact@v4
        with:
          name: bake-metadata-python-${{ env.PLATFORM_PAIR }}
          path: /tmp/bake-metadata.json
          if-no-files-found: error

  merge-python:
    name: Create mpi4py multi-arch manifests
    runs-on: ubuntu-latest
    needs: build-python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bake-metadata-python-*
          path: /tmp/bake-metadata

      - name: Create manifests
        run: |
          IMAGE=docker.io/astropatty/mpi4py
          BAKE_PRINT=$(docker buildx bake python --print 2>/dev/null)

          while IFS= read -r target; do
            AMD64=$(jq -r '."'"$target"'"."containerimage.digest"' \
              /tmp/bake-metadata/bake-metadata-python-linux-amd64/bake-metadata.json)
            ARM64=$(jq -r '."'"$target"'"."containerimage.digest"' \
              /tmp/bake-metadata/bake-metadata-python-linux-arm64/bake-metadata.json)

            readarray -t TAGS < <(echo "$BAKE_PRINT" | jq -r '.target["'"$target"'"].tags[]')
            TAG_ARGS=()
            for tag in "${TAGS[@]}"; do
              TAG_ARGS+=(--tag "$tag")
            done

            docker buildx imagetools create "${TAG_ARGS[@]}" \
              ${IMAGE}@${AMD64} \
              ${IMAGE}@${ARM64}
          done < <(echo "$BAKE_PRINT" | jq -r '.target | keys[]')

  # ── Stage 3: parallel-HDF5 + h5py ───────────────────────────────────────────

  build-h5py:
    name: Build h5py (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: merge-python
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanitize platform name
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        run: |
          docker buildx bake h5py \
            --set "*.platform=${{ matrix.platform }}" \
            --set "*.tags=" \
            --set "*.output=type=image,name=docker.io/astropatty/parallel-h5py,push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file /tmp/bake-metadata.json

      - name: Upload digest metadata
        uses: actions/upload-artifact@v4
        with:
          name: bake-metadata-h5py-${{ env.PLATFORM_PAIR }}
          path: /tmp/bake-metadata.json
          if-no-files-found: error

  merge-h5py:
    name: Create parallel-h5py multi-arch manifests
    runs-on: ubuntu-latest
    needs: build-h5py

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bake-metadata-h5py-*
          path: /tmp/bake-metadata

      - name: Create manifests
        run: |
          IMAGE=docker.io/astropatty/parallel-h5py
          BAKE_PRINT=$(docker buildx bake h5py --print 2>/dev/null)

          while IFS= read -r target; do
            AMD64=$(jq -r '."'"$target"'"."containerimage.digest"' \
              /tmp/bake-metadata/bake-metadata-h5py-linux-amd64/bake-metadata.json)
            ARM64=$(jq -r '."'"$target"'"."containerimage.digest"' \
              /tmp/bake-metadata/bake-metadata-h5py-linux-arm64/bake-metadata.json)

            readarray -t TAGS < <(echo "$BAKE_PRINT" | jq -r '.target["'"$target"'"].tags[]')
            TAG_ARGS=()
            for tag in "${TAGS[@]}"; do
              TAG_ARGS+=(--tag "$tag")
            done

            docker buildx imagetools create "${TAG_ARGS[@]}" \
              ${IMAGE}@${AMD64} \
              ${IMAGE}@${ARM64}
          done < <(echo "$BAKE_PRINT" | jq -r '.target | keys[]')
