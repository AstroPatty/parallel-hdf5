name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanitize platform name
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        run: |
          docker buildx bake \
            --set "*.platform=${{ matrix.platform }}" \
            --set "*.output=type=image,push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file /tmp/bake-metadata.json

      - name: Upload digest metadata
        uses: actions/upload-artifact@v4
        with:
          name: bake-metadata-${{ env.PLATFORM_PAIR }}
          path: /tmp/bake-metadata.json
          if-no-files-found: error

  merge:
    name: Create multi-arch manifests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bake-metadata-*
          path: /tmp/bake-metadata

      - name: Create manifests
        run: |
          IMAGE=docker.io/astropatty/parallel-h5py
          BAKE_PRINT=$(docker buildx bake --print 2>/dev/null)

          while IFS= read -r target; do
            AMD64=$(jq -r '."'"$target"'"."containerimage.digest"' \
              /tmp/bake-metadata/bake-metadata-linux-amd64/bake-metadata.json)
            ARM64=$(jq -r '."'"$target"'"."containerimage.digest"' \
              /tmp/bake-metadata/bake-metadata-linux-arm64/bake-metadata.json)

            readarray -t TAGS < <(echo "$BAKE_PRINT" | jq -r '.target["'"$target"'"].tags[]')
            TAG_ARGS=()
            for tag in "${TAGS[@]}"; do
              TAG_ARGS+=(--tag "$tag")
            done

            docker buildx imagetools create "${TAG_ARGS[@]}" \
              ${IMAGE}@${AMD64} \
              ${IMAGE}@${ARM64}
          done < <(echo "$BAKE_PRINT" | jq -r '.target | keys[]')
